kind = "web"
previewPath = "/"
title = "CarouselBrain"
version = "1.0.0"
id = "artifacts/carousel-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19956

[services.development]
run = "pnpm --filter @workspace/carousel-brain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carousel-brain", "run", "build" ]
publicDir = "artifacts/carousel-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19956"
BASE_PATH = "/"
